site_name: RaBe Universal Base Image 10 Minimal
site_url: https://radiorabe.github.io/container-image-ubi10-minimal/
repo_url: https://github.com/radiorabe/container-image-ubi10-minimal
repo_name: radiorabe/container-image-ubi10-minimal

theme:
  name: "material"
  palette:
    # Palette toggle for dark mode
    - scheme: slate
      primary: '#00c9bf'
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # Palette toggle for light mode
    - scheme: default
      primary: '#00c9bf'
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  icon:
    repo: fontawesome/brands/git-alt
  features:
    - content.code.copy
    - toc.integrate

markdown_extensions:
- pymdownx.highlight:
    anchor_linenums: true
- pymdownx.inlinehilite
- pymdownx.snippets
- pymdownx.superfences

extra_css:
- css/style.css

plugins:
- search
- gen-files:
    scripts:
    - docs/gen_ref_pages.py
- literate-nav
- section-index
- llmstxt:
    markdown_description: |
      The RaBe Universal Base Image 10 Minimal is a stripped-down container base image
      built on AlmaLinux 10 UBI10 minimal. It pre-installs the RaBe Root CA trust anchor
      so that downstream images inherit it automatically. Use it as a FROM base for any
      RaBe container image that needs a modern, lifecycle-managed EL10 foundation.
    sections:
      Documentation:
        - index.md
      Monitoring:
        - monitoring.md

nav:
  - README: index.md
  - Monitoring: monitoring.md

watch:
  - README.md
