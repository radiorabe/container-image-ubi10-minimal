site_name: RaBe Universal Base Image 10 Minimal
site_url: https://radiorabe.github.io/container-image-ubi10-minimal/
repo_url: https://github.com/radiorabe/container-image-ubi10-minimal
repo_name: radiorabe/container-image-ubi10-minimal

theme:
  name: "material"
  custom_dir: docs/overrides
  palette:
    # Palette toggle for dark mode
    - scheme: slate
      primary: '#00c9bf'
      accent: '#00c9bf'
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # Palette toggle for light mode
    - scheme: default
      primary: '#00c9bf'
      accent: '#00c9bf'
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/radio
  features:
    - content.code.annotate
    - content.code.copy
    - navigation.footer
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

markdown_extensions:
- admonition
- attr_list
- md_in_html
- toc:
    permalink: true
- pymdownx.details
- pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji
    emoji_generator: !!python/name:material.extensions.emoji.to_svg
- pymdownx.highlight:
    anchor_linenums: true
- pymdownx.inlinehilite
- pymdownx.snippets
- pymdownx.superfences

extra_css:
- css/style.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/radiorabe/container-image-ubi10-minimal
      name: GitHub
  generator: false

plugins:
- search
- section-index
- llmstxt:
    markdown_description: |
      The RaBe Universal Base Image 10 Minimal is a stripped-down container base image
      built on AlmaLinux 10 UBI10 minimal. It pre-installs the RaBe Root CA trust anchor
      so that downstream images inherit it automatically. Use it as a FROM base for any
      RaBe container image that needs a modern, lifecycle-managed EL10 foundation.
    sections:
      Monitoring:
        - monitoring.md
      Upgrading:
        - upgrading.md
      Downstream:
        - downstream.md

nav:
  - Home: index.md
  - Monitoring: monitoring.md
  - Upgrading: upgrading.md
  - Downstream: downstream.md
