name: Publish Container Images

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - '*'

permissions: {}

jobs:
  container:
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
    uses: radiorabe/actions/.github/workflows/release-container.yaml@f49d301c653f9aa0d99bec7b7f18f2d789e93fa7 # v0.43.4
    with:
      image: 'ghcr.io/radiorabe/ubi10-minimal'
      name: 'ubi10-minimal'
      display-name: 'RaBe Universal Base Image 10 Minimal'
      tags: 'minimal rhel10 el10 rabe'
      # disabled because base images are verified via docker content trust
      cosign-verify: false
      # base images are multi-platform for developer convenience
      platforms: linux/amd64,linux/arm64
      docker-daemon-config: |
        {
          "features": {
            "containerd-snapshotter": true
          }
        }
  mkdocs:
    permissions:
      contents: write # for pushing gh-pages branch
    uses: radiorabe/actions/.github/workflows/release-mkdocs.yaml@f49d301c653f9aa0d99bec7b7f18f2d789e93fa7 # v0.43.4
