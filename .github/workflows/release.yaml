name: Publish Container Images

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - '*'

permissions: {}

jobs:
  call-workflow:
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
    uses: radiorabe/actions/.github/workflows/release-container.yaml@refactor/zizmor/release-container # v0.41.3+test-refactor-3
    with:
      image: 'ghcr.io/radiorabe/ubi10-minimal'
      name: 'ubi10-minimal'
      display-name: 'RaBe Universal Base Image 10 Minimal'
      tags: 'minimal rhel10 el10 rabe'
      # test
      pre-script: |
        echo "Hellow world!"
      # disabled because base images are verified via docker content trust
      # test: cosign-verify: false
      # base images are multi-platform for developer convenience
      platforms: linux/amd64,linux/arm64
      docker-daemon-config: |
        {
          "features": {
            "containerd-snapshotter": true
          }
        }
  mkdocs:
    runs-on: ubuntu-latest
    permissions:
      contents: write # for pushing gh-pages branch
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - run: pip install mkdocs mkdocs-material mkdocs-gen-files mkdocs-literate-nav mkdocs-section-index
      - run: mkdocs build
      - run: mkdocs gh-deploy
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
